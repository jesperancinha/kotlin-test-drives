name: jeorg-kotlin-test-drives-pull-request

on:
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
        - uses: actions/checkout@v7
        - name: Set up JDK 25
          uses: actions/setup-java@v5
          with:
            java-version: '25'
            distribution: 'adopt'
        - name: Setup Gradle 9.6.1
          uses: gradle/gradle-build-action@v3
          with:
            gradle-version: 9.6.1

        - name: All Build
          run: make
